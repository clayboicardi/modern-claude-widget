[versions]
agp = "9.2.0"
# Must match the Kotlin Gradle plugin AGP 9.2 bundles for built-in Kotlin, so the
# Compose compiler plugin aligns with the built-in Kotlin compiler.
kotlin = "2.2.10"
glance = "1.1.1"
coreKtx = "1.15.0"
junit = "4.13.2"

[libraries]
glance-appwidget = { group = "androidx.glance", name = "glance-appwidget", version.ref = "glance" }
glance-material3 = { group = "androidx.glance", name = "glance-material3", version.ref = "glance" }
glance-testing = { group = "androidx.glance", name = "glance-testing", version.ref = "glance" }
glance-appwidget-testing = { group = "androidx.glance", name = "glance-appwidget-testing", version.ref = "glance" }
androidx-core-ktx = { group = "androidx.core", name = "core-ktx", version.ref = "coreKtx" }
junit = { group = "junit", name = "junit", version.ref = "junit" }

[plugins]
# No kotlin-android plugin: AGP 9 provides built-in Kotlin support (applying the
# standalone plugin double-registers the `kotlin` extension and fails the build).
android-application = { id = "com.android.application", version.ref = "agp" }
kotlin-compose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
